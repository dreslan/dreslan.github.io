<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script>
    (function() {
      var theme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <div class="container linktree-container">
    <main>
      {{ content }}
    </main>
    <footer class="linktree-footer">
      <span>&copy; {{ site.time | date: '%Y' }} Dreslan</span>
      <button class="theme-toggle" aria-label="Toggle theme" onclick="toggleTheme()">
        <span class="theme-icon"></span>
      </button>
    </footer>
  </div>
  <script>
    function toggleTheme() {
      var current = document.documentElement.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }

    (function() {
      var nameSpans = document.querySelectorAll('.linktree-name span');
      var akaSpans = document.querySelectorAll('.linktree-aka span');
      if (nameSpans.length < 2 || akaSpans.length < 2) return;
      var step = 80;
      var hold = 180;

      // Single wave — both lines ripple left to right simultaneously
      // Dreslan: flash and fade
      for (var i = 0; i < nameSpans.length; i++) {
        (function(el, t) {
          setTimeout(function() { el.classList.add('gold'); }, t);
          setTimeout(function() { el.classList.remove('gold'); }, t + hold);
        })(nameSpans[i], i * step);
      }

      // aka Tony: each letter locks gold as the wave hits
      for (var i = 0; i < akaSpans.length; i++) {
        (function(el, t) {
          setTimeout(function() { el.classList.add('gold'); }, t);
        })(akaSpans[i], i * step);
      }
    })();
  </script>
</body>
</html>
